<body>
<div class="app">

  <header class="top">
    <h1>Dziennik</h1>
    <p>5 notatek dziennie · spokojnie, dzień po dniu</p>
    <div class="top-right" id="user-bar" hidden></div>
  </header>

  <nav class="tabs" id="tabs" hidden>
    <button data-tab="today" class="active">Dziś</button>
    <button data-tab="calendar">Kalendarz</button>
    <button data-tab="chat">Asystent</button>
    <button data-tab="settings">Ustawienia</button>
  </nav>

  <main id="view"></main>

  <footer class="bottom">
    Dane synchronizowane w chmurze (Supabase).
  </footer>
</div>

<script>
/* ================== Stan i pamięć ================== */

const SETTINGS_KEY = "dziennik.settings.v1";
const MAX_NOTES_PER_DAY = 5;
const MAX_CHARS = 500;
const EDIT_WINDOW_DAYS = 7;

const SUPABASE_URL_CONST = "https://kkegymepatwufnemtldr.supabase.co";

const state = {
  tab: "today",
  notes: {},                   // { "YYYY-MM-DD": [ {id, content, createdAt, updatedAt} ] } — cache
  settings: loadSettings(),
  calendarCursor: startOfMonth(new Date()),
  editing: null,               // { date, id|null, content }
  session: null,
  authMode: "signin",          // "signin" | "signup"
  authError: null,
  authInfo: null,
  authBusy: false,
  chat: { messages: [], proposals: [], busy: false, error: null },
};

function loadSettings() {
  const defaults = { reminderEnabled: false, reminderTime: "21:00" };
  try { return { ...defaults, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}") }; }
  catch { return defaults; }
}
function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }
  catch (e) { console.warn("Nie udało się zapisać ustawień (storage niedostępny):", e); }
}

/* ================== Daty ================== */

function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function addMonths(d, n) { return new Date(d.getFullYear(), d.getMonth() + n, 1); }
function daysInMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(); }

function daysBetween(aYmd, bYmd) {
  const [ay, am, ad] = aYmd.split("-").map(Number);
  const [by, bm, bd] = bYmd.split("-").map(Number);
  const a = new Date(ay, am - 1, ad);
  const b = new Date(by, bm - 1, bd);
  return Math.round((b - a) / 86400000);
}

function isEditable(dateYmd) {
  const today = ymd(new Date());
  const diff = daysBetween(dateYmd, today); // ile dni temu
  if (diff < 0) return false;               // przyszłość — brak edycji
  return diff <= EDIT_WINDOW_DAYS;
}
function isToday(dateYmd) { return dateYmd === ymd(new Date()); }

function formatDateLong(dateYmd) {
  const [y, m, d] = dateYmd.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString("pl-PL", {
    weekday: "long", day: "numeric", month: "long", year: "numeric"
  });
}
function formatMonthYear(d) {
  return d.toLocaleDateString("pl-PL", { month: "long", year: "numeric" });
}

/* ================== Operacje na notatkach (Supabase) ================== */

function getNotes(dateYmd) { return state.notes[dateYmd] || []; }

function mapRow(row) {
  return {
    id: row.id,
    position: row.position,
    content: row.content,
    createdAt: row.created_at,
    updatedAt: row.updated_at,
  };
}

function setDayCache(dateYmd, rows) {
  const sorted = [...rows].sort((a, b) => a.position - b.position).map(mapRow);
  if (sorted.length === 0) delete state.notes[dateYmd];
  else state.notes[dateYmd] = sorted;
}

function firstFreePosition(dateYmd) {
  const used = new Set(getNotes(dateYmd).map(n => n.position));
  for (let p = 1; p <= MAX_NOTES_PER_DAY; p++) if (!used.has(p)) return p;
  return null;
}

async function fetchNotesForRange(fromYmd, toYmd) {
  if (!state.session) return;
  const { data, error } = await window.supabase
    .from("notes")
    .select("id, date, position, content, created_at, updated_at")
    .gte("date", fromYmd)
    .lte("date", toYmd)
    .order("date", { ascending: true })
    .order("position", { ascending: true });
  if (error) { console.warn("fetchNotesForRange:", error.message); return; }
  for (const ymdKey of Object.keys(state.notes)) {
    if (ymdKey >= fromYmd && ymdKey <= toYmd) delete state.notes[ymdKey];
  }
  const grouped = {};
  for (const row of data) (grouped[row.date] ||= []).push(row);
  for (const [d, rows] of Object.entries(grouped)) setDayCache(d, rows);
}

async function fetchNotesForMonth(cursorDate) {
  const y = cursorDate.getFullYear();
  const m = cursorDate.getMonth();
  const from = ymd(new Date(y, m, 1));
  const to = ymd(new Date(y, m + 1, 0));
  await fetchNotesForRange(from, to);
}

async function fetchNotesForDate(dateYmd) {
  await fetchNotesForRange(dateYmd, dateYmd);
}

async function addNote(dateYmd, content) {
  const list = getNotes(dateYmd);
  if (list.length >= MAX_NOTES_PER_DAY) return { ok: false, reason: "limit" };
  const position = firstFreePosition(dateYmd);
  if (position === null) return { ok: false, reason: "limit" };
  const { data, error } = await window.supabase
    .from("notes")
    .insert({
      user_id: state.session.user.id,
      date: dateYmd,
      position,
      content: content.trim(),
    })
    .select("id, date, position, content, created_at, updated_at")
    .single();
  if (error) {
    if (error.code === "23505") return { ok: false, reason: "limit" };
    console.warn("addNote:", error.message);
    return { ok: false, reason: "error", message: error.message };
  }
  setDayCache(dateYmd, [...list.map(rowFromCache), data]);
  return { ok: true };
}

function rowFromCache(n) {
  return { id: n.id, position: n.position, content: n.content, created_at: n.createdAt, updated_at: n.updatedAt };
}

async function updateNote(dateYmd, id, content) {
  const { data, error } = await window.supabase
    .from("notes")
    .update({ content: content.trim() })
    .eq("id", id)
    .select("id, date, position, content, created_at, updated_at")
    .single();
  if (error) { console.warn("updateNote:", error.message); return false; }
  const others = getNotes(dateYmd).filter(n => n.id !== id).map(rowFromCache);
  setDayCache(dateYmd, [...others, data]);
  return true;
}

async function deleteNote(dateYmd, id) {
  const { error } = await window.supabase.from("notes").delete().eq("id", id);
  if (error) { console.warn("deleteNote:", error.message); return false; }
  const remaining = getNotes(dateYmd).filter(n => n.id !== id).map(rowFromCache);
  setDayCache(dateYmd, remaining);
  return true;
}

/* ================== Render ================== */

const view = document.getElementById("view");
const tabsEl = document.getElementById("tabs");
const userBarEl = document.getElementById("user-bar");

function render() {
  if (!state.session) {
    tabsEl.hidden = true;
    userBarEl.hidden = true;
    renderAuth();
    return;
  }

  tabsEl.hidden = false;
  userBarEl.hidden = false;
  userBarEl.innerHTML = `<button id="logout-btn" title="Wyloguj">Wyloguj (${escapeHtml(state.session.user.email || "")})</button>`;
  document.getElementById("logout-btn").addEventListener("click", async () => {
    await window.supabase.auth.signOut();
  });

  document.querySelectorAll("nav.tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === state.tab);
  });

  if (state.tab === "today")    renderDay(ymd(new Date()));
  if (state.tab === "calendar") renderCalendar();
  if (state.tab === "chat")     renderChat();
  if (state.tab === "settings") renderSettings();
  if (state.tab === "day")      renderDay(state.viewingDate || ymd(new Date()));

  if (state.editing) renderEditor();
}

function renderAuth() {
  const isSignup = state.authMode === "signup";
  view.innerHTML = `
    <div class="card auth-card">
      <h2>${isSignup ? "Utwórz konto" : "Zaloguj się"}</h2>
      <p class="sub">${isSignup ? "Załóż konto, aby zsynchronizować notatki." : "Wpisz email i hasło, aby kontynuować."}</p>
      ${state.authError ? `<div class="auth-error">${escapeHtml(state.authError)}</div>` : ""}
      ${state.authInfo ? `<div class="auth-info">${escapeHtml(state.authInfo)}</div>` : ""}
      <form id="auth-form" autocomplete="on">
        <div class="auth-field">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" required autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="auth-password">Hasło</label>
          <input type="password" id="auth-password" required minlength="6"
            autocomplete="${isSignup ? "new-password" : "current-password"}" />
        </div>
        <div class="auth-actions">
          <button type="submit" class="primary" ${state.authBusy ? "disabled" : ""}>
            ${state.authBusy ? "Chwila…" : (isSignup ? "Zarejestruj" : "Zaloguj")}
          </button>
        </div>
      </form>
      <div class="auth-switch">
        ${isSignup ? "Masz już konto?" : "Nie masz konta?"}
        <button type="button" id="auth-toggle">${isSignup ? "Zaloguj się" : "Zarejestruj się"}</button>
      </div>
    </div>
  `;

  document.getElementById("auth-toggle").addEventListener("click", () => {
    state.authMode = isSignup ? "signin" : "signup";
    state.authError = null;
    state.authInfo = null;
    render();
  });

  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (state.authBusy) return;
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    state.authBusy = true;
    state.authError = null;
    state.authInfo = null;
    render();
    try {
      if (isSignup) {
        const { data, error } = await window.supabase.auth.signUp({ email, password });
        if (error) throw error;
        if (!data.session) {
          state.authInfo = "Konto utworzone. Sprawdź mail, aby je potwierdzić, albo wyłącz potwierdzanie maila w Supabase.";
          state.authMode = "signin";
        }
      } else {
        const { error } = await window.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (err) {
      state.authError = err?.message || "Nie udało się zalogować.";
    } finally {
      state.authBusy = false;
      render();
    }
  });
}

function renderDay(dateYmd) {
  fetchNotesForDate(dateYmd).then(() => renderDayInner(dateYmd));
  renderDayInner(dateYmd);
}

function renderDayInner(dateYmd) {
  const notes = getNotes(dateYmd);
  const editable = isEditable(dateYmd);
  const today = isToday(dateYmd);
  const canAdd = editable && notes.length < MAX_NOTES_PER_DAY;

  view.innerHTML = `
    <div class="card">
      <div class="day-header">
        <h2>${today ? "Dziś" : ""}${today ? " · " : ""}${formatDateLong(dateYmd)}</h2>
        <span class="counter ${notes.length >= MAX_NOTES_PER_DAY ? "full" : ""}">
          ${notes.length} / ${MAX_NOTES_PER_DAY}
        </span>
      </div>

      ${!today ? `<button class="primary" id="back-to-cal" style="margin-bottom:14px;background:var(--bg-soft);color:var(--ink);box-shadow:none">← Wróć do kalendarza</button>` : ""}

      ${notes.length === 0
        ? `<div class="empty">Brak notatek z tego dnia.</div>`
        : `<div class="note-list">
            ${notes.map((n, i) => `
              <div class="note ${editable ? "" : "readonly"}">
                <div class="idx">${i + 1}</div>
                <div class="content">${escapeHtml(n.content)}</div>
                <div class="actions">
                  <button data-act="edit" data-date="${dateYmd}" data-id="${n.id}" title="Edytuj">✎</button>
                  <button data-act="del" data-date="${dateYmd}" data-id="${n.id}" title="Usuń">✕</button>
                </div>
              </div>
            `).join("")}
          </div>`
      }

      ${canAdd ? `
        <div class="composer">
          <textarea id="composer-text" maxlength="${MAX_CHARS}"
            placeholder="${today ? "Co dziś zapamiętasz?" : "Dodaj notatkę do tego dnia"} (max ${MAX_CHARS} znaków)"></textarea>
          <div class="composer-row">
            <span class="char-count" id="char-count">0 / ${MAX_CHARS}</span>
            <button class="primary" id="composer-save">Dodaj notatkę</button>
          </div>
        </div>
      ` : ""}

      ${editable && !canAdd ? `<div class="notice">Osiągnięto limit ${MAX_NOTES_PER_DAY} notatek${today ? " na dziś" : " dla tego dnia"}. Usuń jakąś, żeby dodać nową.</div>` : ""}
      ${!editable ? `<div class="notice">Ten dzień jest poza oknem edycji (${EDIT_WINDOW_DAYS} dni). Możesz tylko czytać.</div>` : ""}
    </div>
  `;

  if (canAdd) {
    const ta   = document.getElementById("composer-text");
    const cc   = document.getElementById("char-count");
    const save = document.getElementById("composer-save");
    ta.addEventListener("input", () => {
      cc.textContent = `${ta.value.length} / ${MAX_CHARS}`;
      cc.classList.toggle("warn", ta.value.length > MAX_CHARS * 0.9);
    });
    save.addEventListener("click", async () => {
      const val = ta.value.trim();
      if (!val) {
        ta.focus();
        ta.style.borderColor = "var(--warn)";
        setTimeout(() => { ta.style.borderColor = ""; }, 1200);
        return;
      }
      save.disabled = true;
      const res = await addNote(dateYmd, val);
      save.disabled = false;
      if (res.ok) {
        ta.value = "";
        render();
      } else if (res.reason === "limit") {
        alert(`Osiągnięto limit ${MAX_NOTES_PER_DAY} notatek na ten dzień.`);
        render();
      } else {
        alert("Nie udało się zapisać notatki: " + (res.message || "spróbuj ponownie."));
      }
    });
  }

  view.querySelectorAll("[data-act='edit']").forEach(btn => {
    btn.addEventListener("click", () => {
      const d = btn.dataset.date, id = btn.dataset.id;
      if (!isEditable(d)) return;
      const note = getNotes(d).find(n => n.id === id);
      state.editing = { date: d, id, content: note.content };
      render();
    });
  });
  view.querySelectorAll("[data-act='del']").forEach(btn => {
    btn.addEventListener("click", async () => {
      const d = btn.dataset.date, id = btn.dataset.id;
      if (!isEditable(d)) return;
      await deleteNote(d, id);
      render();
    });
  });

  const back = document.getElementById("back-to-cal");
  if (back) back.addEventListener("click", () => { state.tab = "calendar"; render(); });
}

function renderCalendar() {
  fetchNotesForMonth(state.calendarCursor).then(() => renderCalendarInner());
  renderCalendarInner();
}

function renderCalendarInner() {
  const cursor = state.calendarCursor;
  const firstDow = (new Date(cursor.getFullYear(), cursor.getMonth(), 1).getDay() + 6) % 7; // pon=0
  const total = daysInMonth(cursor);
  const todayYmd = ymd(new Date());

  let cells = "";
  // poprzedni miesiąc (wyszarzone)
  for (let i = 0; i < firstDow; i++) {
    const d = new Date(cursor.getFullYear(), cursor.getMonth(), i - firstDow + 1);
    cells += dayCell(d, true, todayYmd);
  }
  for (let day = 1; day <= total; day++) {
    const d = new Date(cursor.getFullYear(), cursor.getMonth(), day);
    cells += dayCell(d, false, todayYmd);
  }
  // dopełnij do pełnych tygodni
  const used = firstDow + total;
  const rest = (7 - (used % 7)) % 7;
  for (let i = 1; i <= rest; i++) {
    const d = new Date(cursor.getFullYear(), cursor.getMonth() + 1, i);
    cells += dayCell(d, true, todayYmd);
  }

  view.innerHTML = `
    <div class="card">
      <div class="cal-header">
        <button id="prev-month" aria-label="Poprzedni miesiąc">‹</button>
        <h2>${formatMonthYear(cursor)}</h2>
        <button id="next-month" aria-label="Następny miesiąc">›</button>
      </div>
      <div class="cal-grid">
        ${["pon","wt","śr","czw","pt","sob","ndz"].map(d => `<div class="dow">${d}</div>`).join("")}
        ${cells}
      </div>
    </div>
  `;

  document.getElementById("prev-month").addEventListener("click", () => {
    state.calendarCursor = addMonths(state.calendarCursor, -1); render();
  });
  document.getElementById("next-month").addEventListener("click", () => {
    state.calendarCursor = addMonths(state.calendarCursor, 1); render();
  });
  view.querySelectorAll(".cal-day[data-date]").forEach(el => {
    el.addEventListener("click", () => {
      const d = el.dataset.date;
      state.viewingDate = d;
      state.tab = "day";
      renderDay(d);
      document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    });
  });
}

function dayCell(d, outside, todayYmd) {
  const dy = ymd(d);
  const count = getNotes(dy).length;
  const classes = ["cal-day"];
  if (outside) classes.push("outside");
  if (dy === todayYmd) classes.push("today");
  if (count > 0) classes.push("has-notes");
  if (count >= MAX_NOTES_PER_DAY) classes.push("full");
  return `
    <button class="${classes.join(" ")}" data-date="${dy}" title="${formatDateLong(dy)}${count ? ` · ${count} notatek` : ""}">
      ${d.getDate()}
      ${count > 0 ? `<span class="dot"></span>` : ""}
    </button>
  `;
}

function renderSettings() {
  const s = state.settings;
  view.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0">Ustawienia</h2>

      <div class="setting-row">
        <label for="reminder-enabled">Codzienne przypomnienie</label>
        <input type="checkbox" id="reminder-enabled" ${s.reminderEnabled ? "checked" : ""}/>
      </div>

      <div class="setting-row">
        <label for="reminder-time">Godzina przypomnienia</label>
        <input type="time" id="reminder-time" value="${s.reminderTime}" />
      </div>

      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <label>Konto</label>
        <button class="primary" id="settings-logout" style="background:var(--bg-soft);color:var(--ink);box-shadow:none">Wyloguj się</button>
      </div>

      <p style="font-size:12px;color:var(--ink-soft);margin-top:14px;line-height:1.5">
        Przypomnienia działają tylko gdy ta karta jest otwarta w przeglądarce.
        Notatki są zapisywane w Twoim koncie Supabase i synchronizowane między urządzeniami.
      </p>
    </div>
  `;

  document.getElementById("reminder-enabled").addEventListener("change", async (e) => {
    if (e.target.checked && "Notification" in window) {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") { e.target.checked = false; alert("Brak zgody na powiadomienia."); return; }
    }
    state.settings.reminderEnabled = e.target.checked;
    saveSettings();
    scheduleReminder();
  });
  document.getElementById("reminder-time").addEventListener("change", (e) => {
    state.settings.reminderTime = e.target.value;
    saveSettings();
    scheduleReminder();
  });

  document.getElementById("settings-logout").addEventListener("click", async () => {
    await window.supabase.auth.signOut();
  });
}

function renderChat() {
  const chat = state.chat;
  const activeDateYmd = state.tab === "day" && state.viewingDate
    ? state.viewingDate
    : ymd(new Date());

  const logHtml = chat.messages.length === 0 && !chat.busy && !chat.error
    ? `<div class="chat-empty">Zapytaj o powtarzające się wątki, korelacje czasu albo poproś o propozycję notatki.</div>`
    : chat.messages.map(m => {
        if (m.role === "user") {
          return `<div class="chat-bubble user">${escapeHtml(m.content)}</div>`;
        }
        if (m.role === "assistant") {
          const proposalsHtml = (m.proposals || []).map((p, i) =>
            renderProposalCard(p, m.id, i)
          ).join("");
          return `<div class="chat-bubble assistant">${escapeHtml(m.content || "(brak treści)")}</div>${proposalsHtml}`;
        }
        return "";
      }).join("")
      + (chat.busy ? `<div class="typing">Asystent analizuje…</div>` : "")
      + (chat.error ? `<div class="chat-bubble system-error">${escapeHtml(chat.error)}</div>` : "");

  view.innerHTML = `
    <div class="card">
      <div class="day-header">
        <h2>Asystent · Albert Einstein</h2>
        <span class="counter">aktywny dzień: ${activeDateYmd}</span>
      </div>
      <div class="chat-log" id="chat-log">${logHtml}</div>
      <div class="composer">
        <textarea id="chat-input" maxlength="2000"
          placeholder="Np. „Ile razy w czerwcu pisałem o śnie?” albo „Zaproponuj notatkę o dzisiejszej pogodzie.”"></textarea>
        <div class="composer-row">
          <span class="char-count" id="chat-cc">0 / 2000</span>
          <button class="primary" id="chat-send" ${chat.busy ? "disabled" : ""}>${chat.busy ? "Wysyłam…" : "Wyślij"}</button>
        </div>
      </div>
    </div>
  `;

  const log = document.getElementById("chat-log");
  if (log) log.scrollTop = log.scrollHeight;

  const ta = document.getElementById("chat-input");
  const cc = document.getElementById("chat-cc");
  const send = document.getElementById("chat-send");
  ta.addEventListener("input", () => { cc.textContent = `${ta.value.length} / 2000`; });
  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send.click();
    }
  });
  send.addEventListener("click", () => sendChatMessage(ta.value, activeDateYmd));

  document.querySelectorAll("[data-proposal-act]").forEach(btn => {
    btn.addEventListener("click", () => handleProposalAction(
      btn.dataset.msgId,
      Number(btn.dataset.propIdx),
      btn.dataset.proposalAct,
    ));
  });

  if (!ta.value) ta.focus();
}

function renderProposalCard(p, msgId, idx) {
  const stateClass = p.status ? `done` : "";
  const label = p.status === "accepted" ? "✓ Dodano do dziennika"
              : p.status === "rejected" ? "× Odrzucono"
              : p.status === "error" ? `× Błąd: ${escapeHtml(p.errorMessage || "")}`
              : null;
  return `
    <div class="proposal-card ${stateClass}">
      <div class="meta">📝 Propozycja wpisu · ${formatDateLong(p.date)}</div>
      <div class="text">${escapeHtml(p.content)}</div>
      ${label
        ? `<div class="meta" style="text-align:right">${label}</div>`
        : `<div class="actions">
            <button class="reject" data-proposal-act="reject" data-msg-id="${msgId}" data-prop-idx="${idx}">Odrzuć</button>
            <button class="accept" data-proposal-act="accept" data-msg-id="${msgId}" data-prop-idx="${idx}">Akceptuj</button>
          </div>`}
    </div>
  `;
}

async function sendChatMessage(text, activeDateYmd) {
  const val = (text || "").trim();
  if (!val || state.chat.busy) return;

  state.chat.messages.push({ role: "user", content: val });
  state.chat.busy = true;
  state.chat.error = null;
  render();

  await fetchNotesForDate(activeDateYmd);
  const activeNotes = getNotes(activeDateYmd).map(n => ({
    position: n.position, content: n.content,
  }));

  const historyForApi = state.chat.messages
    .filter(m => m.role === "user" || m.role === "assistant")
    .map(m => ({ role: m.role, content: m.content }));

  let payload;
  try {
    const res = await fetch(`${SUPABASE_URL_CONST}/functions/v1/notes-chat`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${state.session.access_token}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        messages: historyForApi,
        context: {
          today_ymd: ymd(new Date()),
          active_date_ymd: activeDateYmd,
          active_date_notes: activeNotes,
        },
      }),
    });
    payload = await res.json();
    if (!res.ok) throw new Error(payload?.error || `HTTP ${res.status}`);
  } catch (err) {
    state.chat.busy = false;
    state.chat.error = `Asystent jest chwilowo niedostępny: ${err.message}`;
    render();
    return;
  }

  const msgId = "m_" + Math.random().toString(36).slice(2, 10);
  state.chat.messages.push({
    id: msgId,
    role: "assistant",
    content: payload.reply || "",
    proposals: (payload.proposals || []).map(p => ({ ...p, status: null })),
  });
  state.chat.busy = false;
  render();
}

async function handleProposalAction(msgId, idx, action) {
  const msg = state.chat.messages.find(m => m.id === msgId);
  if (!msg) return;
  const prop = msg.proposals?.[idx];
  if (!prop || prop.status) return;

  if (action === "reject") {
    prop.status = "rejected";
    render();
    return;
  }
  if (action === "accept") {
    const res = await addNote(prop.date, prop.content);
    if (res.ok) {
      prop.status = "accepted";
      if (state.tab === "day" && state.viewingDate === prop.date) {
        render();
      } else if (state.tab === "today" && prop.date === ymd(new Date())) {
        render();
      } else {
        render();
      }
    } else if (res.reason === "limit") {
      prop.status = "error";
      prop.errorMessage = `osiągnięto limit ${MAX_NOTES_PER_DAY} na ten dzień`;
      render();
    } else {
      prop.status = "error";
      prop.errorMessage = res.message || "nie udało się zapisać";
      render();
    }
  }
}

function renderEditor() {
  const e = state.editing;
  const modal = document.createElement("div");
  modal.className = "modal-backdrop";
  modal.innerHTML = `
    <div class="modal">
      <h3>Edycja notatki · ${formatDateLong(e.date)}</h3>
      <textarea id="edit-text" maxlength="${MAX_CHARS}"
        style="width:100%;min-height:120px;border:1px solid var(--line);border-radius:12px;padding:12px;font:inherit;font-size:15px;color:var(--ink);background:var(--bg)">${escapeHtml(e.content)}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span class="char-count" id="edit-cc">${e.content.length} / ${MAX_CHARS}</span>
      </div>
      <div class="modal-actions">
        ${e.id ? `<button class="delete" id="edit-delete">Usuń</button>` : ""}
        <button class="cancel" id="edit-cancel">Anuluj</button>
        <button class="save" id="edit-save">Zapisz</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  const ta = document.getElementById("edit-text");
  const cc = document.getElementById("edit-cc");
  ta.focus();
  ta.addEventListener("input", () => { cc.textContent = `${ta.value.length} / ${MAX_CHARS}`; });

  const close = () => { modal.remove(); state.editing = null; };

  document.getElementById("edit-cancel").addEventListener("click", close);
  modal.addEventListener("click", (ev) => { if (ev.target === modal) close(); });

  document.getElementById("edit-save").addEventListener("click", async () => {
    const val = ta.value.trim();
    if (!val) { alert("Notatka nie może być pusta."); return; }
    const btn = document.getElementById("edit-save");
    btn.disabled = true;
    let ok = true;
    if (e.id) {
      ok = await updateNote(e.date, e.id, val);
    } else {
      const res = await addNote(e.date, val);
      ok = res.ok;
      if (!ok && res.reason === "limit") alert(`Osiągnięto limit ${MAX_NOTES_PER_DAY} notatek na ten dzień.`);
    }
    btn.disabled = false;
    if (!ok) return;
    close(); render();
  });

  if (e.id) {
    document.getElementById("edit-delete").addEventListener("click", async () => {
      if (!confirm("Usunąć tę notatkę?")) return;
      await deleteNote(e.date, e.id);
      close(); render();
    });
  }
}

/* ================== Przypomnienie ================== */

let reminderTimer = null;
function scheduleReminder() {
  if (reminderTimer) { clearTimeout(reminderTimer); reminderTimer = null; }
  if (!state.settings.reminderEnabled) return;
  if (!("Notification" in window) || Notification.permission !== "granted") return;

  const [h, m] = state.settings.reminderTime.split(":").map(Number);
  const now = new Date();
  const next = new Date(now);
  next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const delay = next - now;

  reminderTimer = setTimeout(() => {
    const todayCount = getNotes(ymd(new Date())).length;
    if (todayCount < MAX_NOTES_PER_DAY) {
      new Notification("Dziennik", { body: `Zapisz dziś notatkę (${todayCount}/${MAX_NOTES_PER_DAY}).` });
    }
    scheduleReminder();
  }, delay);
}

/* ================== Utils ================== */

function escapeHtml(s) {
  return s
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

/* ================== Start ================== */

document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); });
});

async function boot() {
  const { data } = await window.supabase.auth.getSession();
  state.session = data.session;
  render();
  scheduleReminder();

  window.supabase.auth.onAuthStateChange((_event, session) => {
    const wasSignedIn = !!state.session;
    state.session = session;
    if (!session) {
      state.notes = {};
      state.tab = "today";
      state.viewingDate = null;
      state.editing = null;
      state.chat = { messages: [], proposals: [], busy: false, error: null };
    } else if (!wasSignedIn) {
      state.authError = null;
      state.authInfo = null;
    }
    render();
  });
}

if (window.supabase) boot();
else window.addEventListener("supabase-ready", boot, { once: true });
</script>
